name: TicketLifeline
options:
  bundleIdPrefix: com.ticketlifeline
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.0"
    PRODUCT_BUNDLE_IDENTIFIER: com.ticketlifeline.app
targets:
  TicketLifeline:
    type: application
    platform: iOS
    sources:
      - path: TicketLifeline
    settings:
      base:
        INFOPLIST_FILE: TicketLifeline/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets: []
