name: Update LICENSE year

on:
  schedule:
    - cron: "10 0 1 1 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-license:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Pick license file
        shell: bash
        run: |
          set -euo pipefail

          if [ -f LICENSE ]; then
            echo "LICENSE_FILE=LICENSE" >> "$GITHUB_ENV"
          elif [ -f LICENSE.md ]; then
            echo "LICENSE_FILE=LICENSE.md" >> "$GITHUB_ENV"
          else
            echo "LICENSE_FILE=" >> "$GITHUB_ENV"
          fi

      - name: Update license year (MIT)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${LICENSE_FILE:-}" ]; then
            echo "No LICENSE or LICENSE.md found. Nothing to do."
            exit 0
          fi

          python3 - <<'PY'
          import os
          import re
          from datetime import datetime, timezone
          from pathlib import Path

          path = Path(os.environ["LICENSE_FILE"])
          text = path.read_text(encoding="utf-8")
          current_year = datetime.now(timezone.utc).year

          pattern = re.compile(
              r"^(Copyright\s+(?:\(c\)|©)\s+)(\d{4})(?:\s*[-–]\s*(\d{4}))?(\s+.+)$",
              re.MULTILINE,
          )

          match = pattern.search(text)
          if not match:
              print("No recognizable MIT copyright line found. No changes made.")
              raise SystemExit(0)

          prefix, start_text, end_text, suffix = match.groups()
          start_year = int(start_text)

          if current_year <= start_year:
              new_years = start_text
          else:
              new_years = f"{start_text}-{current_year}"

          current_years = start_text if end_text is None else f"{start_text}-{end_text}"
          if current_years == new_years:
              print("License year is already current. No changes needed.")
              raise SystemExit(0)

          new_line = f"{prefix}{new_years}{suffix}"
          new_text = pattern.sub(new_line, text, count=1)
          path.write_text(new_text, encoding="utf-8")
          print(f"Updated {path} to: {new_line}")
          PY
        env:
          LICENSE_FILE: ${{ env.LICENSE_FILE }}

      - name: Commit and push (if changed)
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${LICENSE_FILE:-}" ]; then
            echo "No license file selected. Nothing to commit."
            exit 0
          fi

          if git diff --quiet -- "$LICENSE_FILE"; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add "$LICENSE_FILE"
          git commit -m "chore: update license year"
          git push
        env:
          LICENSE_FILE: ${{ env.LICENSE_FILE }}
